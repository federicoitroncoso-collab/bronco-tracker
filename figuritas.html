<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hindú Club · Tarjetas Individuales</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --green: #2d7a32;
    --green-light: #4caf50;
    --green-bright: #6fcf73;
    --red: #c0392b;
    --gold: #f59e0b;
    --text: #1a2e18;
    --muted: #5a7a56;
    --border: #d0e4cc;
    --surface: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f4ee;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 32px 24px 48px;
  }

  /* HEADER */
  .page-header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
  }
  .header-logos {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .header-logo {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid rgba(76,175,80,0.4);
    box-shadow: 0 0 20px rgba(76,175,80,0.2);
  }
  .header-club {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
  }
  .header-title span { color: var(--green-bright); }
  .header-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }
  .header-stripe {
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--green) 0px, var(--green) 40px, var(--red) 40px, var(--red) 48px, transparent 48px, transparent 56px);
    margin-top: 20px;
    border-radius: 2px;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .filter-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: #ffffff;
    border: 1px solid #c0d8bb;
    color: #5a7a56;
    padding: 9px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--green);
    border-color: var(--green-light);
    color: var(--text);
  }

  /* SECTION */
  .section {
    margin-bottom: 56px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--muted);
  }
  .section-cat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  /* CARDS GRID */
  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  /* THE CARD — figurita style */
  .figurita {
    width: 160px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .figurita:hover {
    transform: translateY(-6px) rotate(-1deg);
    box-shadow: 0 12px 32px rgba(0,0,0,0.7);
  }
  .figurita.gold-card { box-shadow: 0 4px 24px rgba(245,158,11,0.4); }
  .figurita.gold-card:hover { box-shadow: 0 12px 40px rgba(245,158,11,0.6); }
  .figurita.silver-card { box-shadow: 0 4px 24px rgba(156,163,175,0.3); }
  .figurita.bronze-card { box-shadow: 0 4px 24px rgba(205,124,46,0.3); }

  /* Card top — colored band */
  .card-top {
    padding: 10px 12px 8px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    position: relative;
  }
  .card-top.fw { background: linear-gradient(135deg, #1a3a1a, #0d200d); border-bottom: 2px solid var(--green); }
  .card-top.bk { background: linear-gradient(135deg, #3a0d0d, #200808); border-bottom: 2px solid var(--red); }
  .card-top.gold-top { background: linear-gradient(135deg, #3a2a00, #1f1600) !important; border-bottom: 2px solid var(--gold) !important; }

  .card-dorsal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    color: rgba(255,255,255,0.15);
    position: absolute;
    right: 8px;
    top: 4px;
  }
  .card-pos-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    z-index: 1;
  }
  .card-cat-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    background: rgba(255,255,255,0.1);
    padding: 2px 7px;
    border-radius: 4px;
    z-index: 1;
  }

  /* Card middle — main area */
  .card-mid {
    background: #ffffff;
    padding: 12px 12px 8px;
  }
  .card-dorsal-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: rgba(255,255,255,0.06);
    position: absolute;
    bottom: 40px;
    right: 8px;
    pointer-events: none;
  }
  .card-logo-small {
    width: 28px; height: 28px;
    border-radius: 50%;
    margin-bottom: 8px;
    opacity: 0.9;
  }
  .card-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 900;
    line-height: 1.15;
    color: #1a2e18;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .card-puesto {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Card bottom — time */
  .card-bottom {
    padding: 8px 12px 12px;
    background: #f8faf7;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-time-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .card-time {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .card-diag-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Loading */
  #loading-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 50vh;
    color: var(--muted);
    text-align: center;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .figurita { animation: fadeUp 0.3s ease both; }

  /* Back link */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 32px;
    padding: 8px 16px;
    background: #ffffff;
    border: 1px solid #c0d8bb;
    border-radius: 8px;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--green); }
</style>
</head>
<body>

<div id="loading-screen">
  <div>
    <div style="font-family:'Bebas Neue';font-size:36px;letter-spacing:3px;color:#1a2e18;margin-bottom:12px">CARGANDO FIGURITAS...</div>
    <div style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green-light);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
  </div>
</div>

function fmt(s) {
  const m = Math.floor(s/60), r = s%60;
  return String(m).padStart(2,'0') + ':' + String(r).padStart(2,'0');
}
function dColor(d) {
  return d==='Bien' ? '#6fcf73' : d==='Aceptable' ? '#eab308' : '#ef4444';
}

function parseRow(row) {
  const cols = []; let cur = '', inQ = false;
  for (let ch of row) {
    if (ch==='"') { inQ=!inQ; }
    else if (ch===',' && !inQ) { cols.push(cur.trim()); cur=''; }
    else { cur+=ch; }
  }
  cols.push(cur.trim());
  return cols;
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function init() {
  try {
    const res = await fetch(PROXY);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1);
    DATOS = [];
    rows.forEach(row => {
      const c = parseRow(row);
      const nombre = c[1]||'', fecha=(c[2]||'').substring(0,10), puesto=c[3]||'';
      const instancia=c[6]||'', categoria=c[7]||'', segundos=parseInt(c[9])||0;
      const diagRaw=c[11]||'';
      let diagnostico='Bajo';
      if (diagRaw.includes('Bien')) diagnostico='Bien';
      else if (diagRaw.includes('Aceptable')) diagnostico='Aceptable';
      if (nombre && segundos>0) {
        const grupo = GRUPO_MAP[puesto]||(puesto?'Forward':'');
        const vam = +(4320/segundos).toFixed(2);
        DATOS.push({nombre,fecha,puesto,instancia,categoria,segundos,diagnostico,grupo,vam});
      }
    });
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  } catch(e) {
    document.getElementById('loading-screen').innerHTML=`
      <div>
        <div style="font-size:36px;margin-bottom:12px">⚠️</div>
        <div style="font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--text);margin-bottom:8px">No se pudieron cargar los datos</div>
        <div style="font-size:13px;margin-bottom:16px">Error: ${e.message}</div>
        <button onclick="location.reload()" style="background:var(--green);border:none;color:#fff;font-family:'Barlow Condensed';font-size:14px;font-weight:700;letter-spacing:1px;padding:10px 24px;border-radius:8px;cursor:pointer">REINTENTAR</button>
      </div>`;
  }
}

init();
</script>
